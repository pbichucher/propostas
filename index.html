<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propostas — Terrenos AB</title>
<style>
  :root {
    --text: #1a1a1a;
    --muted: #8a8a86;
    --line: #e8e8e4;
    --bg: #fdfdfc;
    --accent: #1a6e4a;
    --warn: #b0541d;
    --hover: #f6f6f3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1020px; margin: 0 auto; padding: 48px 24px 80px; }

  header h1 { font-size: 21px; font-weight: 650; letter-spacing: -0.02em; }
  header p { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .totals { display: flex; gap: 40px; margin: 28px 0 36px; }
  .totals .lbl { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .totals .val { display: block; font-size: 19px; font-weight: 600; margin-top: 2px; }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: right; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    padding: 8px 10px; border-bottom: 1px solid var(--text); white-space: nowrap;
  }
  th:first-child { text-align: left; padding-left: 8px; }
  td {
    padding: 11px 10px; text-align: right; border-bottom: 1px solid var(--line);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  td:first-child { text-align: left; padding-left: 8px; }

  tr.terreno td { font-weight: 600; background: #f7f7f4; border-bottom: 1px solid var(--line); }
  tr.terreno td:first-child { font-size: 14px; }

  tr.oferta { cursor: pointer; }
  tr.oferta:hover { background: var(--hover); }
  tr.oferta td:first-child { padding-left: 26px; font-weight: 400; }
  tr.oferta .chev { color: var(--muted); font-size: 10px; display: inline-block; width: 14px; transition: transform .15s; }
  tr.oferta.open .chev { transform: rotate(90deg); }
  .who { color: var(--muted); }
  .delta-pos { color: var(--accent); font-weight: 600; }
  .delta-neg { color: var(--warn); font-weight: 600; }
  .muted { color: var(--muted); }
  .est { border-bottom: 1px dotted var(--muted); cursor: help; }

  tr.empty td { font-weight: 400; }
  .empty-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 26px 0 6px 8px; }

  /* detalhe da proposta */
  tr.detail > td { padding: 14px 10px 16px 40px; text-align: left; background: #fbfbf9; white-space: normal; }
  .d-grid { display: flex; gap: 36px; flex-wrap: wrap; font-size: 13px; }
  .d-grid .item .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .d-grid .item .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .d-notes { margin-top: 10px; font-size: 12.5px; color: var(--muted); max-width: 680px; }
  .d-notes .warn { color: var(--warn); }

  @media (max-width: 720px) {
    .wrap { padding: 28px 12px 60px; }
    .hide-sm { display: none; }
    .totals { gap: 24px; flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Propostas — Terrenos AB</h1>
    <p>André Bichucher · Atualizado em 11/06/2026</p>
  </header>

  <div class="totals" id="totals"></div>

  <table id="tbl"></table>
</div>

<script>
// ── TERRENOS ──────────────────────────────────────────────────────────────────
// tamanho = área documental (m²). Q45 = 2×4.887,50 (IPTU); Q99 = 2×6.500 (matrículas 22.394/95)
const TERRENOS = [
  { id: 'santos-dumont', name: 'Posto Santos Dumont', grupo: 'ab',     tamanho: 4250,  vpm2_alvo: 8000, total_alvo: 34.0,  proprietario: 'TPA' },
  { id: 'restaurante',   name: 'Santos Dumont 3600', grupo: 'ab',     tamanho: 875,   vpm2_alvo: 8000, total_alvo: 7.0,   proprietario: 'TPA' },
  { id: 'posto-ws',      name: 'Posto Washington Soares', grupo: 'ab', tamanho: 4200,  vpm2_alvo: 3000, total_alvo: 12.6,  proprietario: 'TPA' },
  { id: 'amaralina',     name: 'Amaralina',            grupo: 'ab',     tamanho: 2813,  vpm2_alvo: 3000, total_alvo: 8.4,   proprietario: 'TPA' },
  { id: 'quadra-2-4',    name: 'Quadra 2,4',           grupo: 'familia',tamanho: 17000, vpm2_alvo: 3000, total_alvo: 51.0,  proprietario: 'Já dividida (→ TPA)' },
  { id: 'sitio-butanta', name: 'Sítio Butantã',        grupo: 'familia',tamanho: 64093, vpm2_alvo: 2000, total_alvo: 128.2, proprietario: 'Novo Horizonte' },
  { id: 'quadra-45',     name: 'Quadra 45 Lote 1 e 2',  grupo: 'familia',tamanho: 9775,  vpm2_alvo: 2000, total_alvo: 19.6,  proprietario: 'Já dividida (→ TPA)' },
  { id: 'quadra-99',     name: 'Quadra 99 Lote 1 e 2',  grupo: 'familia',tamanho: 13000, vpm2_alvo: 1500, total_alvo: 19.5,  proprietario: 'Já dividida (→ TPA)' },
  { id: 'quadra-6',      name: 'Quadra 6',              grupo: 'familia',tamanho: 4300,  vpm2_alvo: 2000, total_alvo: 8.6,   proprietario: 'ERG Par' },
  { id: 'gleba-8s',      name: 'Gleba 8S',              grupo: 'familia',tamanho: 82500, vpm2_alvo: 2000, total_alvo: 165.0, proprietario: 'ERG Par' },
  { id: 'quadra-xim',    name: 'Quadra XIM',            grupo: 'familia',tamanho: 10813, vpm2_alvo: 2000, total_alvo: 21.6,  proprietario: 'ERG Par' },
  { id: 'quadra-6pe',    name: 'Quadra 6PE',            grupo: 'familia',tamanho: 5500,  vpm2_alvo: 1000, total_alvo: 5.5,   proprietario: 'Já dividida (→ TPA)' },
];

// ── PROPOSALS (hardcoded — edit here to update) ───────────────────────────────
// loteArea = área oficial do lote (matrícula/IPTU). loteAreaFonte 'proponente' = sem doc, a confirmar.
// O pedido do lote = loteArea × vpm2_alvo do terreno.
let PROPOSALS = {
  'quadra-xim': [
    { id: 'riva_xim', buyer: 'Riva Incorporadora', lote: 'Quadra inteira', loteArea: 10813, loteAreaFonte: 'matrícula', date: '2026-06-10', area: 10183, vpm2: 2147, valor: 21.86, valorLiquido: 19.67, tipo: 'permuta', permutaPct: 12, status: 'proposta-recebida', validade: '2026-07-10', pagamento: 'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes: 'Riva considerou 10.183 m² (630 m² a menos que a matrícula). Desconto de 10% de comercialização embutido no líquido.' }
  ],
  'quadra-99': [
    { id: 'riva_q99', buyer: 'Riva Incorporadora', lote: 'Lote 2 — Dioguinho', loteArea: 6500, loteAreaFonte: 'matrícula', date: '2026-06-10', area: 6500, vpm2: 1935, valor: 12.58, valorLiquido: 11.32, tipo: 'permuta', permutaPct: 10.5, status: 'proposta-recebida', validade: '2026-07-10', pagamento: 'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes: 'Desconto de 10% de comercialização embutido no líquido. Lote 1 (6.500 m²) sem proposta.' }
  ],
  'gleba-8s': [
    { id: 'riva_gleba', buyer: 'Riva Incorporadora', lote: 'Quadra 5 — Aldir Mentor', loteArea: 9598, loteAreaFonte: 'proponente', date: '2026-06-10', area: 9598, vpm2: 1851, valor: 17.76, valorLiquido: 15.98, tipo: 'permuta', permutaPct: 11, status: 'proposta-recebida', validade: '2026-07-10', pagamento: 'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes: 'Desconto de 10% de comercialização embutido no líquido. ⚠️ PDF da Riva traz "Quadra 5" nos valores e "Quadra 4" nas premissas — pedir confirmação.' },
    { id: 'idibra_gleba8s', buyer: 'Construtora Duplo / Idibra', lote: 'Gleba inteira', loteArea: 82500, loteAreaFonte: 'matrícula', date: '2026-06-01', area: 82500, vpm2: 1200, valor: 99.0, valorLiquido: null, tipo: 'permuta-fisica', permutaPct: 40, status: 'em-negociacao', validade: '2026-07-01', pagamento: 'Recebe 40% em unidades prontas. PCV 180 dias, lançamento 24+12 meses.', notes: '⚠️ Vendedor paga 2% de corretagem (~R$ 2,0M). Via André Romcy / NUAAR.' }
  ],
  'quadra-45': [
    { id: 'riva_q45', buyer: 'Riva Incorporadora', lote: 'Lote 1 — Frente Mar', loteArea: 4887.5, loteAreaFonte: 'IPTU', date: '2026-06-10', area: 4888, vpm2: 3177, valor: 15.52, valorLiquido: 13.97, tipo: 'permuta', permutaPct: 13, status: 'proposta-recebida', validade: '2026-07-10', pagamento: 'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes: 'Desconto de 10% de comercialização embutido no líquido. Lote 2 (4.887,50 m²) sem proposta.' }
  ],
  'sitio-butanta': [
    { id: 'riva_butanta', buyer: 'Riva Incorporadora', lote: 'Lotes 2 e 3 — W. Soares', loteArea: 14822, loteAreaFonte: 'proponente', date: '2026-06-10', area: 14822, vpm2: 3004, valor: 44.53, valorLiquido: 40.08, tipo: 'permuta', permutaPct: 14, status: 'proposta-recebida', validade: '2026-07-10', pagamento: 'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes: 'Desconto de 10% de comercialização embutido no líquido. Lote 1 sem proposta. Divisão em lotes é do croqui da Riva — sem subdivisão na matrícula.' },
    { id: 'riva_ws', buyer: 'Riva Incorporadora', lote: 'Lote 02 — WS Antares', loteArea: 6000, loteAreaFonte: 'proponente', date: '2026-06-10', area: 6000, vpm2: 2997, valor: 17.98, valorLiquido: 16.18, tipo: 'permuta', permutaPct: 14, status: 'proposta-recebida', validade: '2026-07-10', pagamento: 'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes: 'Desconto de 10% de comercialização embutido no líquido. ⚠️ Localização a confirmar: não cabe no Posto Washington Soares (4.205,82 m² no IPTU) — tratado como fração do Butantã. Aguardando croqui da Riva.' }
  ],
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const STATUS_LABELS = {
  'proposta-recebida': 'Proposta recebida',
  'em-negociacao': 'Em negociação',
  'aceita': 'Aceita',
  'recusada': 'Recusada',
  'standby': 'Standby',
};
const fmtN  = v => v != null ? Number(v).toLocaleString('pt-BR', {maximumFractionDigits: 0}) : '—';
const fmtM  = v => v != null ? 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' M' : '—';
const fmtM2 = v => v != null ? 'R$ ' + Math.round(v).toLocaleString('pt-BR') : '—';
const fmtDate = d => { if (!d) return '—'; const [y,m,dd] = d.split('-'); return `${dd}/${m}/${y}`; };
const pctTag = (a, b) => {
  if (a == null || b == null || !b) return '';
  const p = (a - b) / b * 100;
  return `<span class="${p >= 0 ? 'delta-pos' : 'delta-neg'}">${p >= 0 ? '+' : ''}${p.toFixed(0)}%</span>`;
};
const liq = p => p.valorLiquido != null ? p.valorLiquido : p.valor;
const GRUPO_LABEL = { ab: 'AB', familia: 'Família' };
const tipoLabel = p => {
  if (p.tipo === 'permuta') return `Permuta financeira ${String(p.permutaPct).replace('.', ',')}%`;
  if (p.tipo === 'permuta-fisica') return `Permuta física ${String(p.permutaPct).replace('.', ',')}%`;
  if (p.tipo === 'venda') return 'Venda';
  return 'Outro';
};
// pedido para o escopo (lote) da proposta
const pedidoLote = (t, p) => (p.loteArea || t.tamanho) * t.vpm2_alvo / 1e6;

let openProps = new Set();

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTotals() {
  const nProps = Object.values(PROPOSALS).reduce((s, a) => s + a.length, 0);
  const nTerrenosProp = Object.keys(PROPOSALS).filter(k => PROPOSALS[k].length).length;
  const pedidoTotal = TERRENOS.reduce((s, t) => s + t.total_alvo, 0);
  // total ofertado: por terreno, o melhor entre (oferta pela área inteira) e (soma das ofertas por lote),
  // para não somar escopos sobrepostos (ex.: Gleba 8S inteira + Quadra 5)
  let ofertadoTotal = 0;
  for (const t of TERRENOS) {
    const props = PROPOSALS[t.id] || [];
    if (!props.length) continue;
    const whole = props.filter(p => (p.loteArea || 0) >= t.tamanho * 0.97);
    const partial = props.filter(p => (p.loteArea || 0) < t.tamanho * 0.97);
    const bestWhole = whole.length ? Math.max(...whole.map(liq)) : 0;
    const sumPartial = partial.reduce((s, p) => s + liq(p), 0);
    ofertadoTotal += Math.max(bestWhole, sumPartial);
  }
  document.getElementById('totals').innerHTML = `
    <div><span class="lbl">Terrenos</span><span class="val">${TERRENOS.length}</span></div>
    <div><span class="lbl">Com proposta</span><span class="val">${nTerrenosProp}</span></div>
    <div><span class="lbl">Propostas</span><span class="val">${nProps}</span></div>
    <div><span class="lbl">Pedido total (portfólio)</span><span class="val">${fmtM(pedidoTotal)}</span></div>
    <div><span class="lbl">Ofertado (líq.)</span><span class="val">${fmtM(ofertadoTotal)}</span></div>`;
}

function renderDetail(t, p) {
  const ped = pedidoLote(t, p);
  const areaDiff = p.area != null && p.loteArea != null && Math.abs(p.area - p.loteArea) > 1;
  return `<tr class="detail"><td colspan="8">
    <div class="d-grid">
      <div class="item"><span class="lbl">Modelo</span><br><span class="v">${tipoLabel(p)}</span></div>
    </div>
    <div class="d-notes">
      ${p.pagamento ? `<div><b>Pagamento:</b> ${p.pagamento}</div>` : ''}
      ${areaDiff ? `<div>Área considerada pelo proponente: ${fmtN(p.area)} m² (lote: ${fmtN(p.loteArea)} m²).</div>` : ''}
      ${p.loteAreaFonte === 'proponente' ? `<div class="warn">Área do lote segundo o proponente — sem subdivisão documental, a confirmar.</div>` : ''}
      ${p.notes ? `<div>${p.notes.replace(/⚠️([^.]*\.)/g, '<span class="warn">⚠️$1</span>')}</div>` : ''}
    </div>
  </td></tr>`;
}

function render() {
  renderTotals();
  const withProps = TERRENOS.filter(t => (PROPOSALS[t.id] || []).length);
  const without = TERRENOS.filter(t => !(PROPOSALS[t.id] || []).length);

  let html = `<thead><tr>
    <th>Terreno / lote</th>
    <th class="hide-sm" style="text-align:left">Grupo</th>
    <th>Área</th>
    <th class="hide-sm">R$/m² pedido</th>
    <th class="hide-sm">R$/m² oferta</th>
    <th>Pedido</th>
    <th>Oferta líq.</th>
    <th>Δ</th>
  </tr></thead><tbody>`;

  for (const t of withProps) {
    html += `<tr class="terreno">
      <td>${t.name}</td>
      <td class="hide-sm" style="text-align:left;font-weight:400;color:var(--muted)">${GRUPO_LABEL[t.grupo] || t.grupo}</td>
      <td>${fmtN(t.tamanho)} m²</td>
      <td class="hide-sm">${fmtM2(t.vpm2_alvo)}</td>
      <td class="hide-sm"></td>
      <td>${fmtM(t.total_alvo)}</td>
      <td></td><td></td>
    </tr>`;
    for (const p of PROPOSALS[t.id]) {
      const ped = pedidoLote(t, p);
      const isOpen = openProps.has(p.id);
      const est = p.loteAreaFonte === 'proponente';
      const vpm2Liq = liq(p) * 1e6 / (p.area || p.loteArea);
      html += `<tr class="oferta ${isOpen ? 'open' : ''}" onclick="toggle('${p.id}')">
        <td><span class="chev">▶</span>${p.lote} <span class="who">· ${p.buyer}</span></td>
        <td class="hide-sm"></td>
        <td><span class="${est ? 'est' : ''}" ${est ? 'title="área segundo o proponente — a confirmar"' : ''}>${fmtN(p.loteArea)} m²${est ? '*' : ''}</span></td>
        <td class="hide-sm">${fmtM2(t.vpm2_alvo)}</td>
        <td class="hide-sm">${fmtM2(vpm2Liq)}</td>
        <td>${fmtM(ped)}</td>
        <td><b>${fmtM(liq(p))}</b></td>
        <td>${pctTag(liq(p), ped)}</td>
      </tr>`;
      if (isOpen) html += renderDetail(t, p);
    }
  }
  html += `</tbody>`;
  document.getElementById('tbl').innerHTML = html;

  if (without.length) {
    let extra = `<tbody><tr><td colspan="8" style="border:none;padding:0"><div class="empty-title">Sem proposta</div></td></tr>`;
    for (const t of without) {
      extra += `<tr class="empty">
        <td style="padding-left:8px">${t.name}</td>
        <td class="hide-sm" style="text-align:left;color:var(--muted)">${GRUPO_LABEL[t.grupo] || t.grupo}</td>
        <td>${fmtN(t.tamanho)} m²</td>
        <td class="hide-sm">${fmtM2(t.vpm2_alvo)}</td>
        <td class="hide-sm">—</td>
        <td>${fmtM(t.total_alvo)}</td>
        <td>—</td><td>—</td>
      </tr>`;
    }
    extra += `</tbody>`;
    document.getElementById('tbl').innerHTML += extra;
  }
}

function toggle(id) {
  openProps.has(id) ? openProps.delete(id) : openProps.add(id);
  render();
}

render();
</script>
</body>
</html>
