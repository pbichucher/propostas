<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propostas Terrenos da Família</title>
<style>
  :root {
    --text: #1a1a1a;
    --muted: #8a8a86;
    --line: #e8e8e4;
    --bg: #fdfdfc;
    --accent: #1a6e4a;
    --warn: #b0541d;
    --vgv: #6a4ea0;
    --hover: #f6f6f3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 24px 80px; }

  header h1 { font-size: 21px; font-weight: 650; letter-spacing: -0.02em; }
  header p { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .totals { display: flex; gap: 38px; margin: 28px 0 14px; flex-wrap: wrap; }
  .totals .lbl { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .totals .val { display: block; font-size: 19px; font-weight: 600; margin-top: 2px; }
  .totals .val.vgv { color: var(--vgv); }

  .legend { font-size: 11.5px; color: var(--muted); margin: 0 0 26px; display: flex; gap: 16px; flex-wrap: wrap; }
  .legend b { color: var(--text); font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: right; font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); padding: 8px 10px;
    border-bottom: 1px solid var(--text); white-space: nowrap;
  }
  th:first-child { text-align: left; padding-left: 8px; }
  th.l { text-align: left; }
  td {
    padding: 10px; text-align: right; border-bottom: 1px solid var(--line);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  td:first-child { text-align: left; padding-left: 8px; }

  tr.terreno > td { font-weight: 600; background: #f4f4f1; border-bottom: 1px solid #dededa; }
  tr.terreno > td:first-child { font-size: 14px; }
  tr.terreno.clickable { cursor: pointer; }
  tr.terreno.clickable:hover > td { background: #eeeeea; }

  tr.lote, tr.prop { cursor: default; }
  tr.lote.clickable, tr.prop.clickable { cursor: pointer; }
  tr.lote.clickable:hover > td, tr.prop.clickable:hover > td { background: var(--hover); }
  tr.lote > td:first-child { padding-left: 26px; font-weight: 400; }
  tr.prop > td:first-child { padding-left: 26px; font-weight: 400; }
  tr.prop.lvl2 > td:first-child { padding-left: 44px; }
  tr.prop > td { color: #4a4a47; }
  tr.lote .chev, tr.prop .chev { color: var(--muted); font-size: 9px; display: inline-block; width: 13px; transition: transform .15s; }
  tr.lote.open .chev, tr.prop.open .chev { transform: rotate(90deg); }

  .chip {
    display: inline-block; font-size: 11px; font-weight: 600; padding: 1px 8px;
    border-radius: 99px; white-space: nowrap;
  }
  .who { color: var(--muted); font-weight: 400; }
  .semprop { color: var(--muted); font-style: italic; font-size: 12.5px; }

  /* VGV cores */
  .vgvval  { color: var(--vgv); font-weight: 600; }   /* roxo = parcial */
  .vgvdark { color: #2a2a2a; font-weight: 700; }       /* escuro = terreno inteiro */

  /* detalhe */
  tr.detail > td { padding: 12px 10px 14px 40px; text-align: left; background: #fbfbf9; white-space: normal; }
  .d-grid { display: flex; gap: 30px; flex-wrap: wrap; font-size: 13px; margin-bottom: 8px; }
  .d-grid .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .d-grid .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .d-notes { font-size: 12.5px; color: var(--muted); max-width: 700px; }
  .d-notes b { color: var(--text); font-weight: 550; }
  .d-notes .warn { color: var(--warn); }
  .muted { color: var(--muted); }

  @media (max-width: 740px) {
    .wrap { padding: 26px 12px 60px; }
    .hide-sm { display: none; }
    .totals { gap: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Propostas Terrenos da Família</h1>
    <p>André Bichucher · Atualizado em 13/06/2026</p>
  </header>

  <div class="totals" id="totals"></div>
  <div class="legend">
    <span><b>TPA</b> André (ERG Incorp.)</span>
    <span><b>Grupo A</b> André, Otto, Bernardo</span>
    <span><b>Grupo B</b> Adolfo, Dominique, Cláudio</span>
    <span><b>ERG Par/Família</b> os 6 sócios</span>
  </div>
  <div class="legend">
    <span><b style="color:#2a2a2a">VGV escuro</b> = terreno inteiro</span>
    <span><b style="color:var(--vgv)">VGV roxo</b> = parcial (não cobre o terreno todo)</span>
  </div>

  <table id="tbl"></table>
</div>

<script>
// ── DADOS ─────────────────────────────────────────────────────────────────────
// Cada terreno tem lotes; cada lote tem dono, área, vgv (potencial, R$ milhões) e props[].
// vgv do terreno = soma dos lotes. Pedido do lote = área × vpm2_alvo.
// Fontes VGV: fotos (totais do terreno) ou extrapolação pelo R$/m² da foto / oferta.
const TERRENOS = [
  { id:'santos-dumont', name:'Santos Dumont 3636', vpm2_alvo:8635, lotes:[
    { nome:'Imóvel inteiro', dono:'TPA', area:4250, vgv:306.0, props:[] },
  ]},
  { id:'restaurante', name:'Santos Dumont 3600', vpm2_alvo:9371, lotes:[
    { nome:'Imóvel inteiro', dono:'TPA', area:875, vgv:63.0, props:[] },
  ]},
  { id:'amaralina', name:'Quadra Amaralina', vpm2_alvo:3000, lotes:[
    { nome:'Imóvel inteiro', dono:'TPA', area:2813, vgv:71.2, props:[] },
  ]},
  { id:'quadra-2-4', name:'Quadra 2,4', vpm2_alvo:3000, lotes:[
    { nome:'Parte fundo', dono:'Otto + Bernardo', area:6000, vgv:195.0, props:[
      { buyer:'Riva Incorporadora', tipo:'permuta', permutaPct:14, vgv:151.822, valor:17.98, valorLiquido:16.18, vpm2:2997, areaConsiderada:6000, date:'2026-06-10', validade:'2026-07-10', pagamento:'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes:'Desconto de 10% de comercialização embutido no líquido. Antes chamada "WS Antares". Área a confirmar com croqui.' },
    ]},
    { nome:'Parte TPA', dono:'TPA', area:2425, vgv:78.8, props:[] },
    { nome:'Parte Grupo B', dono:'Grupo B', area:8575, vgv:278.7, props:[] },
  ]},
  { id:'sitio-butanta', name:'Sítio Butantã', vpm2_alvo:2500, lotes:[
    { nome:'Otto + Bernardo (Lotes 2 e 3)', dono:'Otto + Bernardo', area:18974, vgv:569.2, props:[
      { buyer:'Riva Incorporadora', tipo:'permuta', permutaPct:14, vgv:290.666, valor:44.53, valorLiquido:40.08, vpm2:3004, areaConsiderada:14822, date:'2026-06-10', validade:'2026-07-10', pagamento:'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes:'Desconto de 10% de comercialização embutido no líquido. Riva ofertou só 14.822 m² dos 18.974 m² do Otto + Bernardo.' },
    ]},
    { nome:'Posto Washington Soares', dono:'TPA', area:4200, vpm2:3250, vgv:163.8, props:[] },
    { nome:'Parte Grupo B', dono:'Grupo B', area:40919, vgv:1227.6, props:[] },
  ]},
  { id:'quadra-45', name:'Quadra 45', vpm2_alvo:2000, lotes:[
    { nome:'Lote 1 — Frente Mar', dono:'Grupo A', area:4887.5, vgv:116.48, props:[
      { buyer:'Riva Incorporadora', tipo:'permuta', permutaPct:13, vgv:116.48, valor:15.52, valorLiquido:13.97, vpm2:3177, areaConsiderada:4888, date:'2026-06-10', validade:'2026-07-10', pagamento:'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes:'Desconto de 10% de comercialização embutido no líquido.' },
    ]},
    { nome:'Lote 2', dono:'Grupo B', area:4887.5, vgv:116.48, props:[] },
  ]},
  { id:'quadra-99', name:'Quadra 99', vpm2_alvo:1500, lotes:[
    { nome:'Lote 1', dono:'Grupo B', area:6500, vgv:165.18, props:[] },
    { nome:'Lote 2', dono:'TPA', area:6500, vgv:165.18, props:[
      { buyer:'Riva Incorporadora', tipo:'permuta', permutaPct:10.5, vgv:126.505, valor:12.58, valorLiquido:11.32, vpm2:1935, areaConsiderada:6500, date:'2026-06-10', validade:'2026-07-10', pagamento:'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes:'Desconto de 10% de comercialização embutido no líquido. Lote 2 é somente do André (matrícula 22.395).' },
    ]},
  ]},
  { id:'quadra-6', name:'Quadra 6', vpm2_alvo:2000, lotes:[
    { nome:'Quadra inteira', dono:'ERG Par/Família', area:4300, vgv:71.8, props:[] },
  ]},
  { id:'gleba-8s', name:'Gleba 8S', vpm2_alvo:2000, lotes:[
    { nome:'Gleba inteira (em divisão)', dono:'ERG Par/Família', area:96784, vgv:1766.5, props:[
      { buyer:'Construtora Duplo / Idibra', tipo:'permuta-fisica', permutaPct:40, vgv:247.5, valor:99.0, valorLiquido:null, vpm2:1200, areaConsiderada:82500, escopo:'Gleba inteira', date:'2026-06-01', validade:'2026-07-01', pagamento:'Recebe 40% em unidades prontas. PCV 180 dias, lançamento 24+12 meses.', notes:'VGV ofertado = R$ 99M ÷ 40% (permuta física) = R$ 247,5M. ⚠️ Vendedor paga 2% de corretagem (~R$ 2,0M). Via André Romcy / NUAAR.' },
      { buyer:'Riva Incorporadora', tipo:'permuta', permutaPct:11, vgv:175.203, valor:17.76, valorLiquido:15.98, vpm2:1851, areaConsiderada:9598, escopo:'Quadra 5 — Aldir Mentor', date:'2026-06-10', validade:'2026-07-10', pagamento:'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes:'Desconto de 10% de comercialização embutido no líquido. Cobre só a Quadra 5 (9.598 m²), menor que a cota de um sócio (16.130 m²). ⚠️ PDF da Riva traz "Quadra 5" nos valores e "Quadra 4" nas premissas.' },
    ]},
  ]},
  { id:'quadra-xim', name:'Quadra XIM', vpm2_alvo:2000, lotes:[
    { nome:'Quadra inteira', dono:'ERG Par/Família', area:10183, vgv:227.733, props:[
      { buyer:'Riva Incorporadora', tipo:'permuta', permutaPct:12, vgv:227.733, valor:21.86, valorLiquido:19.67, vpm2:2147, areaConsiderada:10183, date:'2026-06-10', validade:'2026-07-10', pagamento:'Fluxo de recebíveis + medição de obra. Opção de compra 90 dias.', notes:'Desconto de 10% de comercialização embutido no líquido.' },
    ]},
  ]},
  { id:'quadra-6pe', name:'Quadra 6PE', vpm2_alvo:2000, lotes:[
    { nome:'Terreno inteiro', dono:'ERG Par/Família', area:5500, vgv:91.8, props:[
      { buyer:'Victa', tipo:'permuta', permutaPct:11, vgv:91.8, valor:10.098, valorLiquido:10.098, vpm2:1781, areaConsiderada:5671, date:'2026-04-01', validade:null, pagamento:'11% do VGV em moeda corrente, conforme vendas e medição. 360 unid. em 2 torres, ~R$ 255 mil/unid.', notes:'Área residencial 5.671,24 m² a confirmar após regularização. Cronograma de 6 anos. Proposta R03, abril/2026.' },
    ]},
  ]},
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmtN  = v => v != null ? Number(v).toLocaleString('pt-BR', {maximumFractionDigits:0}) : '—';
const fmtM  = v => v != null ? 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' M' : '—';
const fmtM2 = v => v != null ? 'R$ ' + Math.round(v).toLocaleString('pt-BR') : '—';
const fmtVGV = v => v == null ? '—' : (v >= 1000
  ? 'R$ ' + (v/1000).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' bi'
  : 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' M');
const fmtDate = d => { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };

const DONO_COLOR = {
  'TPA':             {bg:'#e3efe8', fg:'#1a6e4a'},
  'Grupo A':         {bg:'#e6eef7', fg:'#2b5f9e'},
  'Otto + Bernardo': {bg:'#e0eff0', fg:'#1f7a82'},
  'Grupo B':         {bg:'#f4e7e0', fg:'#b0541d'},
  'ERG Par/Família': {bg:'#ece6f4', fg:'#6a4ea0'},
};
const chip = dono => { const c = DONO_COLOR[dono] || {bg:'#efefeb', fg:'#8a8a86'}; return `<span class="chip" style="background:${c.bg};color:${c.fg}">${dono}</span>`; };
const liqP = p => p.valorLiquido != null ? p.valorLiquido : p.valor;
const tipoLabel = p => (p.tipo==='permuta' ? `Permuta financeira ${String(p.permutaPct).replace('.',',')}%`
  : p.tipo==='permuta-fisica' ? `Permuta física ${String(p.permutaPct).replace('.',',')}%`
  : p.tipo==='venda' ? 'Venda' : 'Outro');

const pedidoLote   = (t, l) => l.area * (l.vpm2 || t.vpm2_alvo) / 1e6;
const pedidoTerreno= t => t.lotes.reduce((s,l)=> s + pedidoLote(t,l), 0);
const areaTerreno  = t => t.lotes.reduce((s,l)=> s + l.area, 0);
const vgvTerreno   = t => { const s = t.lotes.reduce((a,l)=> a + (l.vgv||0), 0); return s || null; };
const bestLote     = l => l.props.length ? Math.max(...l.props.map(liqP)) : null;
const ofertaTerreno= t => { let s=0,has=false; for(const l of t.lotes){ const b=bestLote(l); if(b!=null){s+=b;has=true;} } return has?s:null; };
// VGV ofertado: o que a proposta calculou (por lote = maior; por terreno = soma dos lotes)
const vgvOfLote    = l => { const v = l.props.map(p=>p.vgv).filter(x=>x!=null); return v.length?Math.max(...v):null; };
const vgvOfTerreno = t => { let s=0,has=false; for(const l of t.lotes){ const v=vgvOfLote(l); if(v!=null){s+=v;has=true;} } return has?s:null; };

const vgvVal  = v => v==null ? '—' : `<span class="vgvval">${fmtVGV(v)}</span>`;   // roxo (parcial)
const vgvDark = v => v==null ? '—' : `<span class="vgvdark">${fmtVGV(v)}</span>`;  // escuro (terreno inteiro)
// a oferta cobre o terreno inteiro? (lotes com proposta somam ~toda a área)
const ofertaCobreTerreno = t => t.lotes.reduce((s,l)=> s + (l.props.length?l.area:0), 0) >= areaTerreno(t) * 0.95;

let open = new Set();
const rowKey = (ti, li, pi) => `${ti}.${li}.${pi==null?'x':pi}`;

// ── RENDER ────────────────────────────────────────────────────────────────────
const COLS = 7;
const isTPA = t => t.lotes.every(l => l.dono === 'TPA');

function renderTotals() {
  const nProps = TERRENOS.reduce((s,t)=> s + t.lotes.reduce((a,l)=> a + l.props.length, 0), 0);
  const pedido = TERRENOS.reduce((s,t)=> s + pedidoTerreno(t), 0);
  const ofertado = TERRENOS.reduce((s,t)=> s + (ofertaTerreno(t)||0), 0);
  const vgvPot = TERRENOS.reduce((s,t)=> s + (vgvTerreno(t)||0), 0);
  const vgvOf  = TERRENOS.reduce((s,t)=> s + (vgvOfTerreno(t)||0), 0);
  // VGV potencial sem Grupo B: exclui lotes Grupo B inteiros e metade dos ERG Par/Família (3 de 6 sócios são Grupo B)
  const vgvSemB = TERRENOS.reduce((s,t)=> s + t.lotes.reduce((a,l)=> {
    if (!l.vgv || l.dono === 'Grupo B') return a;
    if (l.dono === 'ERG Par/Família')   return a + l.vgv * 0.5;
    return a + l.vgv;
  }, 0), 0);
  document.getElementById('totals').innerHTML = `
    <div><span class="lbl">Terrenos</span><span class="val">${TERRENOS.length}</span></div>
    <div><span class="lbl">Propostas</span><span class="val">${nProps}</span></div>
    <div><span class="lbl">VGV potencial</span><span class="val vgv">${fmtVGV(vgvPot)}</span></div>
    <div><span class="lbl">Pedido total</span><span class="val">${fmtM(pedido)}</span></div>
    <div><span class="lbl">VGV ofertado</span><span class="val vgv">${fmtVGV(vgvOf)}</span></div>
    <div><span class="lbl">Ofertado (líq.)</span><span class="val">${fmtM(ofertado)}</span></div>
    <div><span class="lbl">VGV pot. s/ Grupo B</span><span class="val vgv">${fmtVGV(vgvSemB)}</span></div>`;
}

function detailRow(t, p) {
  const vpm2Of = liqP(p) * 1e6 / p.areaConsiderada;
  return `<tr class="detail"><td colspan="${COLS}">
    <div class="d-grid">
      <div><div class="lbl">Modelo</div><div class="v">${tipoLabel(p)}</div></div>
      <div><div class="lbl">Área considerada</div><div class="v">${fmtN(p.areaConsiderada)} m²</div></div>
      <div><div class="lbl">R$/m² pedido → oferta</div><div class="v">${fmtM2(t.vpm2_alvo)} → ${fmtM2(vpm2Of)}</div></div>
      <div><div class="lbl">Validade</div><div class="v">${fmtDate(p.validade)}</div></div>
    </div>
    <div class="d-notes">${p.pagamento?`<b>Pagamento:</b> ${p.pagamento}`:''}${p.notes?`<br>${p.notes.replace(/⚠️([^.]*\.)/g,'<span class="warn">⚠️$1</span>')}`:''}</div>
  </td></tr>`;
}

// linhas das construtoras (uma por proposta) sob um lote → expandem no detalhe
function propRows(t, l, li, lvl2) {
  let h = '';
  const ratePed = (l.vgv && l.area) ? l.vgv / l.area : null;   // VGV pedido por m² do lote
  l.props.forEach((p, pi) => {
    const k = rowKey(t.id, li, pi);
    const o = open.has(k);
    const vgvPed = ratePed != null ? ratePed * p.areaConsiderada : null;
    h += `<tr class="prop clickable ${lvl2?'lvl2':''} ${o?'open':''}" onclick="toggle('${k}')">
      <td><span class="chev">▶</span>${p.buyer}${p.escopo?` <span class="who">· ${p.escopo}</span>`:''}</td>
      <td class="hide-sm"></td>
      <td>${fmtN(p.areaConsiderada)} m²</td>
      <td>${vgvVal(vgvPed)}</td>
      <td>${fmtM(p.areaConsiderada * (l.vpm2 || t.vpm2_alvo) / 1e6)}</td>
      <td>${vgvVal(p.vgv)}</td>
      <td>${fmtM(liqP(p))}</td>
    </tr>`;
    if (o) h += detailRow(t, p);
  });
  return h;
}

function render() {
  renderTotals();
  let html = `<thead><tr>
    <th class="l">Terreno / lote</th>
    <th class="l hide-sm">Proprietário</th>
    <th>Área</th>
    <th>VGV potencial</th>
    <th>Pedido</th>
    <th>VGV ofertado</th>
    <th>Oferta líq.</th>
  </tr></thead><tbody>`;

  // ordem: terrenos da TPA por último; dentro de cada grupo, por VGV potencial desc
  const ordered = [...TERRENOS].sort((a,b) => {
    if (isTPA(a) !== isTPA(b)) return isTPA(a) ? 1 : -1;
    return (vgvTerreno(b)||0) - (vgvTerreno(a)||0);
  });

  ordered.forEach((t) => {
    const single   = t.lotes.length === 1;
    const hasProps = t.lotes.some(l => l.props.length > 0);
    const expandable = !single || hasProps;
    const tKey = 'T:'+t.id;
    const tOpen = open.has(tKey);
    const ownerCell = chip(isTPA(t) ? 'TPA' : 'ERG Par/Família');
    const ofTer = ofertaTerreno(t);

    html += `<tr class="terreno ${expandable?'clickable':''} ${tOpen?'open':''}" ${expandable?`onclick="toggle('${tKey}')"`:''}>
      <td>${expandable?'<span class="chev">▶</span>':'<span style="display:inline-block;width:13px"></span>'}${t.name}</td>
      <td class="hide-sm">${ownerCell}</td>
      <td>${fmtN(areaTerreno(t))} m²</td>
      <td>${vgvDark(vgvTerreno(t))}</td>
      <td>${fmtM(pedidoTerreno(t))}</td>
      <td>${ofertaCobreTerreno(t) ? vgvDark(vgvOfTerreno(t)) : vgvVal(vgvOfTerreno(t))}</td>
      <td>${ofTer!=null ? fmtM(ofTer) : '<span class="semprop">sem proposta</span>'}</td>
    </tr>`;

    if (!expandable || !tOpen) return;

    // terreno de 1 lote: mostra direto as construtoras
    if (single) { html += propRows(t, t.lotes[0], 0, false); return; }

    // terreno com vários lotes: linha de cada lote; lote com proposta abre nas construtoras
    t.lotes.forEach((l, li) => {
      const hasP = l.props.length > 0;
      const lKey = 'L:'+t.id+'.'+li;
      const lOpen = open.has(lKey);
      html += `<tr class="lote ${hasP?'clickable':''} ${lOpen?'open':''}" ${hasP?`onclick="toggle('${lKey}')"`:''}>
        <td>${hasP?'<span class="chev">▶</span>':'<span style="display:inline-block;width:13px"></span>'}${l.nome}</td>
        <td class="hide-sm">${chip(l.dono)}</td>
        <td>${fmtN(l.area)} m²</td>
        <td>${vgvVal(l.vgv)}</td>
        <td>${fmtM(pedidoLote(t,l))}</td>
        <td>${vgvVal(vgvOfLote(l))}</td>
        <td>${hasP ? fmtM(bestLote(l)) : '<span class="semprop">sem proposta</span>'}</td>
      </tr>`;
      if (hasP && lOpen) html += propRows(t, l, li, true);
    });
  });

  html += `</tbody>`;
  document.getElementById('tbl').innerHTML = html;
}

function toggle(k){ open.has(k)?open.delete(k):open.add(k); render(); }
render();
</script>
</body>
</html>
