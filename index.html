<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propostas — Terrenos AB</title>
<style>
  :root {
    --text: #1a1a1a;
    --muted: #8a8a86;
    --line: #e8e8e4;
    --bg: #fdfdfc;
    --accent: #1a6e4a;
    --warn: #b0541d;
    --hover: #f6f6f3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1060px; margin: 0 auto; padding: 48px 24px 80px; }

  header h1 { font-size: 21px; font-weight: 650; letter-spacing: -0.02em; }
  header p { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .totals { display: flex; gap: 40px; margin: 28px 0 36px; }
  .totals div span { display: block; }
  .totals .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .totals .val { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; margin-top: 2px; }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: right; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    padding: 8px 12px; border-bottom: 1px solid var(--text);
    white-space: nowrap;
  }
  th:first-child { text-align: left; padding-left: 8px; }
  td {
    padding: 12px; text-align: right; border-bottom: 1px solid var(--line);
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  td:first-child { text-align: left; padding-left: 8px; font-weight: 550; }
  tr.terreno { cursor: pointer; }
  tr.terreno:hover { background: var(--hover); }
  tr.terreno .chev { color: var(--muted); font-size: 10px; display: inline-block; width: 14px; transition: transform .15s; }
  tr.terreno.open .chev { transform: rotate(90deg); }
  tr.empty td { color: var(--muted); font-weight: 400; }
  tr.empty td:first-child { font-weight: 400; }
  .sub { display: block; font-size: 11.5px; color: var(--muted); font-weight: 400; }
  .delta-pos { color: var(--accent); }
  .delta-neg { color: var(--warn); }
  .muted { color: var(--muted); }

  /* detalhe expandido */
  tr.detail > td { padding: 0 0 8px 0; background: #fafaf8; border-bottom: 1px solid var(--line); white-space: normal; }
  .prop {
    padding: 18px 20px 16px 34px; text-align: left;
  }
  .prop + .prop { border-top: 1px dashed var(--line); }
  .prop-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .prop-head .buyer { font-weight: 600; font-size: 14px; }
  .badge {
    font-size: 11px; color: var(--muted); background: #efefeb;
    padding: 1px 8px; border-radius: 99px; font-weight: 500;
  }
  .badge.status { background: #e7f0eb; color: var(--accent); }
  .prop-head .when { font-size: 12px; color: var(--muted); margin-left: auto; }

  .cmp { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; max-width: 720px; }
  .cmp > div { flex: 1; padding: 12px 16px; }
  .cmp > div + div { border-left: 1px solid var(--line); }
  .cmp .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
  .cmp .row { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; padding: 1px 0; }
  .cmp .row b { font-weight: 600; font-variant-numeric: tabular-nums; }
  .cmp .d { font-size: 12px; margin-top: 4px; font-weight: 600; }

  .partial-note { font-size: 12px; color: var(--warn); margin: 10px 0 0; }
  .prop-notes { font-size: 12.5px; color: var(--muted); margin-top: 10px; max-width: 720px; }
  .prop-notes b { color: var(--text); font-weight: 550; }

  .section-gap { height: 28px; }
  .empty-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 26px 0 6px 8px; }

  @media (max-width: 720px) {
    .wrap { padding: 28px 12px 60px; }
    .hide-sm { display: none; }
    .cmp { flex-direction: column; }
    .cmp > div + div { border-left: none; border-top: 1px solid var(--line); }
    .totals { gap: 24px; flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Propostas — Terrenos AB</h1>
    <p>André Bichucher · Atualizado em 11/06/2026</p>
  </header>

  <div class="totals" id="totals"></div>

  <table id="tbl"></table>
</div>

<script>
// ── TERRENOS ──────────────────────────────────────────────────────────────────
const TERRENOS = [
  { id: 'santos-dumont', name: 'Posto Santos Dumont', grupo: 'ab',     tamanho: 4250,  vpm2_alvo: 8000, total_alvo: 34.0,   proprietario: 'TPA' },
  { id: 'restaurante',   name: 'Santos Dumont 3600', grupo: 'ab',     tamanho: 875,   vpm2_alvo: 8000, total_alvo: 7.0,    proprietario: 'TPA' },
  { id: 'posto-ws',      name: 'Posto Washington Soares', grupo: 'ab',     tamanho: 4200,  vpm2_alvo: 3000, total_alvo: 12.6,   proprietario: 'TPA' },
  { id: 'amaralina',     name: 'Amaralina',            grupo: 'ab',     tamanho: 2813,  vpm2_alvo: 3000, total_alvo: 8.4,    proprietario: 'TPA' },
  { id: 'quadra-2-4',    name: 'Quadra 2,4',           grupo: 'familia',tamanho: 17000, vpm2_alvo: 5000, total_alvo: 85.0,   proprietario: 'Já dividida (→ TPA)' },
  { id: 'sitio-butanta', name: 'Sítio Butantã',        grupo: 'familia',tamanho: 64093, vpm2_alvo: 1500, total_alvo: 96.1,   proprietario: 'Novo Horizonte' },
  { id: 'quadra-45',     name: 'Quadra 45 Lote 1 e 2',  grupo: 'familia',tamanho: 10000, vpm2_alvo: 2000, total_alvo: 20.0,   proprietario: 'Já dividida (→ TPA)' },
  { id: 'quadra-99',     name: 'Quadra 99 Lote 1 e 2',  grupo: 'familia',tamanho: 13500, vpm2_alvo: 1500, total_alvo: 20.3,   proprietario: 'Já dividida (→ TPA)' },
  { id: 'quadra-6',      name: 'Quadra 6',              grupo: 'familia',tamanho: 4300,  vpm2_alvo: 2000, total_alvo: 8.6,    proprietario: 'ERG Par' },
  { id: 'gleba-8s',      name: 'Gleba 8S',              grupo: 'familia',tamanho: 82500, vpm2_alvo: 1500, total_alvo: 123.75, proprietario: 'ERG Par' },
  { id: 'quadra-xim',    name: 'Quadra XIM',            grupo: 'familia',tamanho: 10813, vpm2_alvo: 2000, total_alvo: 21.6,   proprietario: 'ERG Par' },
  { id: 'quadra-6pe',    name: 'Quadra 6PE',            grupo: 'familia',tamanho: 5500,  vpm2_alvo: 1000, total_alvo: 5.5,    proprietario: 'Já dividida (→ TPA)' },
];

// ── PROPOSALS (hardcoded — edit here to update) ───────────────────────────────
let PROPOSALS = {
  'quadra-xim': [
    { id: 'riva_xim', buyer: 'Riva Incorporadora', lote: 'Quadra XIM (inteira)', date: '2026-06-10', area: 10183, vpm2: 2147, valor: 21.86, valorLiquido: 19.67, pagamento: 'Permuta financeira 12% — fluxo de recebíveis + medição de obra', tipo: 'permuta', status: 'proposta-recebida', validade: '2026-07-10', notes: '402 unidades (2q+3q suíte). Desconto 10% comercialização. Opção de compra 90 dias.' }
  ],
  'quadra-99': [
    { id: 'riva_q99', buyer: 'Riva Incorporadora', lote: 'Lote 2 — Dioguinho', date: '2026-06-10', area: 6500, vpm2: 1935, valor: 12.58, valorLiquido: 11.32, pagamento: 'Permuta financeira 10,5% — fluxo de recebíveis + medição de obra', tipo: 'permuta', status: 'proposta-recebida', validade: '2026-07-10', notes: 'Proposta somente para o Lote 2 (Dioguinho). Lote 1 sem proposta. 276 unidades (2q+3q suíte). Desconto 10% comercialização. Opção 90 dias.' }
  ],
  'gleba-8s': [
    { id: 'riva_gleba', buyer: 'Riva Incorporadora', lote: 'Quadra 5 — Aldir Mentor', date: '2026-06-10', area: 9598, vpm2: 1851, valor: 17.76, valorLiquido: 15.98, pagamento: 'Permuta financeira 11% — fluxo de recebíveis + medição de obra', tipo: 'permuta', status: 'proposta-recebida', validade: '2026-07-10', notes: 'Proposta somente para a Quadra 5 (Aldir Mentor) — fração da gleba. 378 unidades (2q+3q suíte). Desconto 10% comercialização. Opção 90 dias.' },
    { id: 'idibra_gleba8s', buyer: 'Construtora Duplo / Idibra', lote: 'Gleba inteira (82.500 m²)', date: '2026-06-01', area: 82500, vpm2: 1200, valor: 99.0, valorLiquido: null, pagamento: 'Permuta Física 40% (unidades) — PCV 180 dias, lançamento 24+12 meses', tipo: 'permuta-fisica', status: 'em-negociacao', validade: '2026-07-01', notes: 'Área bruta 150.000m². ⚠️ Vendedor paga 2% corretagem (~R$2,0M) + comprador 3%. Via André Romcy / NUAAR.' }
  ],
  'quadra-45': [
    { id: 'riva_q45', buyer: 'Riva Incorporadora', lote: 'Lote 1 — Frente Mar', date: '2026-06-10', area: 4888, vpm2: 3177, valor: 15.52, valorLiquido: 13.97, pagamento: 'Permuta financeira 13% — fluxo de recebíveis + medição de obra', tipo: 'permuta', status: 'proposta-recebida', validade: '2026-07-10', notes: 'Proposta somente para o Lote 1 (Frente Mar). Lote 2 sem proposta. 416 unidades (1 quarto 28m²). Desconto 10% comercialização. Opção 90 dias.' }
  ],
  'sitio-butanta': [
    { id: 'riva_butanta', buyer: 'Riva Incorporadora', lote: 'Lotes 2 e 3 — W. Soares', date: '2026-06-10', area: 14822, vpm2: 3004, valor: 44.53, valorLiquido: 40.08, pagamento: 'Permuta financeira 14% — fluxo de recebíveis + medição de obra', tipo: 'permuta', status: 'proposta-recebida', validade: '2026-07-10', notes: 'Proposta somente para Lotes 2 e 3 (W. Soares) — Lote 1 sem proposta. Fração do Butantã. 664 unidades (2q+3q suíte). Desconto 10% comercialização. Opção 90 dias.' },
    { id: 'riva_ws', buyer: 'Riva Incorporadora', lote: 'Lote 02 — WS Antares', date: '2026-06-10', area: 6000, vpm2: 2997, valor: 17.98, valorLiquido: 16.18, pagamento: 'Permuta financeira 14% — fluxo de recebíveis + medição de obra', tipo: 'permuta', status: 'proposta-recebida', validade: '2026-07-10', notes: '268 unidades (2q+3q suíte). Desconto 10% comercialização. ⚠️ "WS Antares Lote 02" (6.000m²) não cabe no Posto WS (4.205,82m² conforme IPTU) — tratado como fração do Butantã. Aguardando croqui topográfico da Riva para confirmar localização.' }
  ],
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const STATUS_LABELS = {
  'proposta-recebida': 'Proposta recebida',
  'em-negociacao': 'Em negociação',
  'aceita': 'Aceita',
  'recusada': 'Recusada',
  'standby': 'Standby',
};
const TIPO_LABELS = {
  'venda': 'Venda',
  'permuta': 'Permuta financeira',
  'permuta-fisica': 'Permuta física',
  'outro': 'Outro',
};
const fmtN  = v => v != null ? Number(v).toLocaleString('pt-BR') : '—';
const fmtM  = v => v != null ? 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' M' : '—';
const fmtM2 = v => v != null ? 'R$ ' + Math.round(v).toLocaleString('pt-BR') : '—';
const fmtDate = d => { if (!d) return '—'; const [y,m,dd] = d.split('-'); return `${dd}/${m}/${y}`; };
const pct = (a, b) => (b ? ((a - b) / b * 100) : null);
const pctTag = (a, b) => {
  const p = pct(a, b);
  if (p == null) return '';
  const cls = p >= 0 ? 'delta-pos' : 'delta-neg';
  return `<span class="${cls}">${p >= 0 ? '+' : ''}${p.toFixed(0)}%</span>`;
};
// proposta líquida "efetiva": líquido se existir, senão bruto
const liq = p => p.valorLiquido != null ? p.valorLiquido : p.valor;
// melhor proposta do terreno = maior R$/m² (comparável mesmo com áreas parciais)
const bestProp = props => props.slice().sort((a, b) => (b.vpm2 || 0) - (a.vpm2 || 0))[0];

let openTerrenos = new Set(Object.keys(PROPOSALS));

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTotals() {
  const withProps = TERRENOS.filter(t => (PROPOSALS[t.id] || []).length);
  const nProps = Object.values(PROPOSALS).reduce((s, a) => s + a.length, 0);
  const pedidoTotal = TERRENOS.reduce((s, t) => s + t.total_alvo, 0);
  const ofertaLiq = withProps.reduce((s, t) => s + liq(bestProp(PROPOSALS[t.id])), 0);
  document.getElementById('totals').innerHTML = `
    <div><span class="lbl">Terrenos</span><span class="val">${TERRENOS.length}</span></div>
    <div><span class="lbl">Propostas</span><span class="val">${nProps}</span></div>
    <div><span class="lbl">Pedido total (portfólio)</span><span class="val">${fmtM(pedidoTotal)}</span></div>
    <div><span class="lbl">Melhores ofertas (líq.)</span><span class="val">${fmtM(ofertaLiq)}</span></div>`;
}

function renderPropDetail(t, p) {
  const isPartial = p.area != null && t.tamanho != null && p.area < t.tamanho * 0.97;
  const areaPct = p.area && t.tamanho ? Math.round(p.area / t.tamanho * 100) : null;
  const pedidoProp = p.area ? p.area * t.vpm2_alvo / 1e6 : t.total_alvo; // pedido para a área considerada

  return `<div class="prop">
    <div class="prop-head">
      <span class="buyer">${p.buyer}</span>
      ${p.lote ? `<span class="badge">${p.lote}</span>` : ''}
      <span class="badge">${TIPO_LABELS[p.tipo] || p.tipo}</span>
      <span class="badge status">${STATUS_LABELS[p.status] || p.status}</span>
      <span class="when">${fmtDate(p.date)} · válida até ${fmtDate(p.validade)}</span>
    </div>

    <div class="cmp">
      <div>
        <div class="lbl">Área</div>
        <div class="row"><span class="muted">Terreno</span><b>${fmtN(t.tamanho)} m²</b></div>
        <div class="row"><span class="muted">Considerada</span><b>${fmtN(p.area)} m²</b></div>
        ${areaPct != null && areaPct < 100 ? `<div class="d delta-neg">cobre ${areaPct}% do terreno</div>` : areaPct != null ? `<div class="d delta-pos">terreno inteiro</div>` : ''}
      </div>
      <div>
        <div class="lbl">R$ / m²</div>
        <div class="row"><span class="muted">Pedido</span><b>${fmtM2(t.vpm2_alvo)}</b></div>
        <div class="row"><span class="muted">Oferecido</span><b>${fmtM2(p.vpm2)}</b></div>
        <div class="d">${pctTag(p.vpm2, t.vpm2_alvo)} <span class="muted" style="font-weight:400">vs pedido</span></div>
      </div>
      <div>
        <div class="lbl">Valor${isPartial ? ' (p/ a área considerada)' : ''}</div>
        <div class="row"><span class="muted">Pedido</span><b>${fmtM(pedidoProp)}</b></div>
        <div class="row"><span class="muted">Oferecido líq.</span><b>${fmtM(liq(p))}</b></div>
        <div class="d">${pctTag(liq(p), pedidoProp)} <span class="muted" style="font-weight:400">${p.valorLiquido != null ? `· bruto ${fmtM(p.valor)}` : ''}</span></div>
      </div>
    </div>

    ${isPartial ? `<p class="partial-note">Proposta parcial — não cobre o terreno inteiro. Comparação de valor feita sobre os ${fmtN(p.area)} m² considerados.</p>` : ''}
    <p class="prop-notes"><b>Pagamento:</b> ${p.pagamento || '—'}${p.notes ? `<br>${p.notes}` : ''}</p>
  </div>`;
}

function render() {
  renderTotals();
  const withProps = TERRENOS.filter(t => (PROPOSALS[t.id] || []).length);
  const without = TERRENOS.filter(t => !(PROPOSALS[t.id] || []).length);

  let html = `<thead><tr>
    <th>Terreno</th>
    <th>Área</th>
    <th class="hide-sm">Pedido R$/m²</th>
    <th>Pedido</th>
    <th>Melhor oferta líq.</th>
    <th class="hide-sm">Oferta R$/m²</th>
    <th>Δ R$/m²</th>
  </tr></thead><tbody>`;

  for (const t of withProps) {
    const props = PROPOSALS[t.id];
    const best = bestProp(props);
    const isOpen = openTerrenos.has(t.id);
    const partial = best.area && best.area < t.tamanho * 0.97;
    html += `<tr class="terreno ${isOpen ? 'open' : ''}" onclick="toggle('${t.id}')">
      <td><span class="chev">▶</span>${t.name}<span class="sub" style="padding-left:14px">${props.length} proposta${props.length > 1 ? 's' : ''}${props.length > 1 ? '' : ' — ' + best.buyer}</span></td>
      <td>${fmtN(t.tamanho)} m²</td>
      <td class="hide-sm">${fmtM2(t.vpm2_alvo)}</td>
      <td>${fmtM(t.total_alvo)}</td>
      <td><b>${fmtM(liq(best))}</b>${partial ? `<span class="sub">p/ ${fmtN(best.area)} m²</span>` : ''}</td>
      <td class="hide-sm">${fmtM2(best.vpm2)}</td>
      <td>${pctTag(best.vpm2, t.vpm2_alvo)}</td>
    </tr>`;
    if (isOpen) {
      html += `<tr class="detail"><td colspan="7">${props.map(p => renderPropDetail(t, p)).join('')}</td></tr>`;
    }
  }

  html += `</tbody>`;
  document.getElementById('tbl').innerHTML = html;

  // terrenos sem proposta
  if (without.length) {
    let extra = `<tbody>`;
    extra += `<tr><td colspan="7" style="border:none;padding:0"><div class="empty-title">Sem proposta</div></td></tr>`;
    for (const t of without) {
      extra += `<tr class="empty">
        <td style="padding-left:22px">${t.name}</td>
        <td>${fmtN(t.tamanho)} m²</td>
        <td class="hide-sm">${fmtM2(t.vpm2_alvo)}</td>
        <td>${fmtM(t.total_alvo)}</td>
        <td>—</td><td class="hide-sm">—</td><td>—</td>
      </tr>`;
    }
    extra += `</tbody>`;
    document.getElementById('tbl').innerHTML += extra;
  }
}

function toggle(id) {
  openTerrenos.has(id) ? openTerrenos.delete(id) : openTerrenos.add(id);
  render();
}

render();
</script>
</body>
</html>
